<body>
    <div class="d-flex">
        <div class="sidebar text-center">
            <h3 class="text-light mb-3">Menu</h3>   
            <ul class="nav flex-column gap-2">
                <li class="nav-item"><a class="btn btn-outline-light w-100" href="main.html">Accueil</a></li>
                <li class="nav-item"><a class="btn btn-outline-light w-100" href="about.html">À propos</a></li>

        <div class="main-content flex-grow-1">
            <header class="bg-primary text-white p-4 mb-4">
                <div class="container text-center">
                    <h1 class="mb-3">Contact</h1>
                </div>
            </header>
            <div class="container text-center">
                <section>
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label">Nom :</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email :</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Message :</label>
                            <textarea class="form-control" id="message" name="message" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Envoyer</button>
                    </form>
                </section>
            </div>
        </div>
    </div>
